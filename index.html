  const uid = () => Math.random().toString(36).slice(2,10);
  const todayStr = () => new Date().toISOString().slice(0,10);
  function daysUntil(dateStr){
    if(!dateStr) return null;
    const target = new Date(dateStr+"T00:00:00");
    const now = new Date(); now.setHours(0,0,0,0);
    return Math.ceil((target-now)/86400000);
  }
  function toChinese(n){
    if(n===0) return "○";
    const digits="〇一二三四五六七八九";
    if(n<=10) return ["十","一","二","三","四","五","六","七","八","九","十"][n];
    if(n<20) return "十"+digits[n-10];
    return digits[Math.floor(n/10)]+"十"+(n%10?digits[n%10]:"");
  }
  function esc(s){
    return (s||"").replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
  }

  /* ---------- storage (localStorage) ---------- */
  const NS = "ohs_";
  function loadData(key, fallback){
    try{
      const v = localStorage.getItem(NS+key);
      if(v !== null) return JSON.parse(v);
      return fallback;
    }catch(e){ return fallback; }
  }
  function saveData(key, value){
    try{ localStorage.setItem(NS+key, JSON.stringify(value)); }catch(e){ console.error(e); }
  }

  /* ---------- state ---------- */
  let state = {
    loaded:false, tab:"dashboard",
    examDate:"",
    chapterState: Object.fromEntries(CHAPTERS.map(c=>[c.id,{status:"todo",notes:""}])),
    questions: [],
    wrongMap: {},
    studyLog: {},
    laws: LAW_SEED,
    bankMode:"manual",
    bankDraft:{chapter:1,text:"",options:["","","",""],answer:0,note:""},
    bankBulkText:"", bankBulkMsg:"", bankFilterChapter:"all",
    quizChapterFilter:"all", quizPool:[], quizIdx:0, quizSelected:null, quizRevealed:false, quizStats:{correct:0,total:0},
    quizMultiSelected:[], quizFillInput:"", quizFillCorrect:false,
    lawQuery:"", lawShowForm:false, lawDraft:{law:"職業安全衛生法",article:"",penalty:"",refs:"",note:""},
    headerEditing:false,
    syncMsg:"",
  };

  const root = document.getElementById("app");

  async function init(){
    state.examDate = (loadData("meta",{examDate:""}).examDate) || "";
    const seedFlag = loadData("questionSeedV1Applied", false);
    state.chapterState = loadData("chapterState", state.chapterState);
    if(!seedFlag && state.chapterState[5] && state.chapterState[5].status==="todo"){
      state.chapterState[5] = {...state.chapterState[5], status:"reading", notes: state.chapterState[5].notes || "張木原講師教材，已匯入23題歷屆考古題"};
      saveData("chapterState", state.chapterState);
    }
    state.questions = loadData("questions", []);
    if(!seedFlag){
      const existIds = new Set(state.questions.map(q=>q.id));
      const newQs = QUESTION_SEED.filter(q=>!existIds.has(q.id));
      state.questions = [...state.questions, ...newQs];
      saveData("questions", state.questions);
      saveData("questionSeedV1Applied", true);
    }
    const seedFlagV2 = loadData("questionSeedV2Applied", false);
    if(!seedFlagV2){
      const existIds = new Set(state.questions.map(q=>q.id));
      const newQs = QUESTION_SEED_V2.filter(q=>!existIds.has(q.id));
      state.questions = [...state.questions, ...newQs];
      saveData("questions", state.questions);
      saveData("questionSeedV2Applied", true);
    }
    const seedFlagV3 = loadData("questionSeedV3Applied", false);
    if(!seedFlagV3){
      const existIds = new Set(state.questions.map(q=>q.id));
      const newQs = QUESTION_SEED_V3.filter(q=>!existIds.has(q.id));
      state.questions = [...state.questions, ...newQs];
      saveData("questions", state.questions);
      saveData("questionSeedV3Applied", true);
    }

    // 從 questions.js 載入額外題目（Claude Code 解析 PDF 後寫入）
    if(Array.isArray(window.EXTERNAL_QUESTIONS) && window.EXTERNAL_QUESTIONS.length > 0){
      const existIds = new Set(state.questions.map(q=>q.id));
      const newQs = window.EXTERNAL_QUESTIONS.filter(q=>q.id && !existIds.has(q.id));
      if(newQs.length > 0){
        state.questions = [...state.questions, ...newQs];
        saveData("questions", state.questions);
      }
    }

    state.wrongMap = loadData("wrongMap", {});
    state.studyLog = loadData("studyLog", {});
    state.laws = loadData("laws", LAW_SEED);
    state.loaded = true;
    render();
  }

  function persist(key){
    if(!state.loaded) return;
    const map = {
      meta: ()=>saveData("meta",{examDate:state.examDate}),
      chapterState: ()=>saveData("chapterState",state.chapterState),
      questions: ()=>saveData("questions",state.questions),
      wrongMap: ()=>saveData("wrongMap",state.wrongMap),
      studyLog: ()=>saveData("studyLog",state.studyLog),
      laws: ()=>saveData("laws",state.laws),
    };
    if(map[key]) map[key]();
  }

  function markStudiedToday(){
    state.studyLog[todayStr()] = true;
    persist("studyLog");
  }

  /* ---------- render ---------- */
  function render(){
    if(!state.loaded){
      root.innerHTML = '<div class="loading">讀取中…</div>';
      return;
    }
    const doneCount = Object.values(state.chapterState).filter(c=>c.status==="done").length;
    const progressPct = Math.round((doneCount/CHAPTERS.length)*100);

    root.innerHTML = `
      ${renderHeader(progressPct)}
      <main>${renderTab(doneCount,progressPct)}</main>
      ${renderNav()}
    `;
    bindEvents();
  }

  function renderHeader(progressPct){
    const d = daysUntil(state.examDate);
    return `
      <div class="header">
        <div class="header-top">
          <div>
            <div class="kicker">職業安全衛生管理員乙級技術士</div>
            <div class="h1">讀書進度管理</div>
          </div>
          <div class="exam-badge" id="examBadge">
            ${state.examDate ? `<div class="exam-num">${d>=0?d:0}</div><div class="exam-label">天後應考</div>` : `<div style="font-size:12px;color:#C9A876;">設定考試日期</div>`}
          </div>
        </div>
        ${state.headerEditing ? `
          <div class="exam-edit">
            <input type="date" id="examDateInput" value="${state.examDate}" style="border-radius:8px;border:none;padding:6px 8px;font-size:13px;">
            <button class="primary-btn" id="examDoneBtn" style="background:#C9A876;color:#2B2620;width:auto;padding:6px 12px;font-size:12px;">完成</button>
          </div>` : ``}
        <div class="progress-outer"><div class="progress-inner" style="width:${progressPct}%"></div></div>
      </div>
    `;
  }

  function renderNav(){
    const dueWrongCount = computeWrongQuestions().filter(q=>!q.meta.dueDate||q.meta.dueDate<=todayStr()).length;
    const items = [
      ["dashboard","◆","總覽"],["chapters","▤","章節"],["bank","✎","題庫"],
      ["quiz","▶","練習"],["wrong","★","錯題本",dueWrongCount],["laws","§","法規"],["sync","⇅","備份"],
    ];
    return `<nav class="nav">${items.map(it=>{
      const [key,icon,label,badge] = it;
      return `<button class="nav-btn ${state.tab===key?'active':''}" data-tab="${key}">
        <span class="nav-icon">${icon}${badge?`<span class="nav-badge">${badge}</span>`:''}</span>
        <span style="font-size:11px;margin-top:2px;">${label}</span>
      </button>`;
    }).join("")}</nav>`;
  }

  function renderTab(doneCount,progressPct){
    if(state.tab==="dashboard") return renderDashboard(doneCount,progressPct);
    if(state.tab==="chapters") return renderChapters();
    if(state.tab==="bank") return renderBank();
    if(state.tab==="quiz") return renderQuiz();
    if(state.tab==="wrong") return renderWrong();
    if(state.tab==="laws") return renderLaws();
    if(state.tab==="sync") return renderSync();
    return "";
  }

  /* ---------- Dashboard ---------- */
  function renderDashboard(doneCount,progressPct){
    const d = daysUntil(state.examDate);
    const studiedToday = !!state.studyLog[todayStr()];
    let streak=0, cursor=new Date();
    while(true){
      const key=cursor.toISOString().slice(0,10);
      if(state.studyLog[key]){ streak++; cursor.setDate(cursor.getDate()-1); } else break;
    }
    const remaining = CHAPTERS.length - doneCount;
    let suggestion;
    if(!state.examDate) suggestion = "先在上方設定考試日期，才能算出每日進度建議。";
    else if(d<=0) suggestion = "考試日已到或已過，請依現況調整。";
    else if(remaining>0){
      const perDay = Math.max(1, Math.ceil(remaining/Math.max(1,d-14)));
      suggestion = `建議扣除考前 14 天衝刺期，剩餘 ${Math.max(d-14,1)} 天讀完 ${remaining} 個章節，平均每 ${perDay} 天完成 1 章。`;
    } else suggestion = "章節已全部讀完，接下來請把每天的時間集中在「練習」與「錯題本」上。";

    const dueWrongCount = computeWrongQuestions().filter(q=>!q.meta.dueDate||q.meta.dueDate<=todayStr()).length;

    return `
      <div class="card-row">
        ${statCard("章節進度", `${doneCount} / ${CHAPTERS.length}`, `${progressPct}%`)}

  function statCard(label,value,sub,accent){
    return `<div class="stat-card ${accent?'accent':''}">

      <div class="stat-value">${esc(String(value))}</div>
      <div class="stat-sub">${esc(sub)}</div>
    </div>`;
  }

  /* ---------- Chapters ---------- */
  function renderChapters(){
    return `
      <div class="section-title">章節清單（共 20 章）</div>
      <div class="section-desc">點一下狀態標籤可循環切換：未讀 → 閱讀中 → 已完成</div>

        const s = STATUS[st];
        const notes = state.chapterState[c.id]?.notes||"";
        return `<div class="chapter-card">
          <div class="chapter-top">
            <div class="chapter-idx">第${toChinese(c.id)}章</div>
            <button class="status-pill" data-cycle="${c.id}" style="color:${s.color};background:${s.bg};">${s.label}</button>
          </div>
          <div class="chapter-title">${esc(c.title)}</div>
          <div class="chapter-pages">P.${c.pages}</div>

  function answerDisplay(q){
    const t = q.type||"single";
    if(t==="single") return q.options[q.answer];
    if(t==="multi") return q.answer.map(i=>q.options[i]).join("、");
    return q.answer;
  }

  /* ---------- Quiz ---------- */
  function renderQuiz(){
    if(state.questions.length===0){
      return `<div class="empty-hint">題庫目前是空的，請先到「題庫」分頁新增考古題再來練習。</div>`;
    }
    if(state.quizPool.length===0){
      return `
        <div class="section-title">開始練習</div>
        <label class="label">選擇範圍</label>
        <select id="quizChapterSelect" class="text-input">
          <option value="all">全部章節（${state.questions.length} 題）</option>
          ${CHAPTERS.map(c=>{
            const n = state.questions.filter(q=>q.chapter===c.id).length;
            return `<option value="${c.id}" ${n===0?'disabled':''} ${state.quizChapterFilter===c.id?'selected':''}>${c.id===0?'概論':('第'+toChinese(c.id)+'章')} ${esc(c.title)}（${n} 題）</option>`;
          }).join("")}
        </select>
        <button class="primary-btn" id="startQuizBtn">開始隨機練習</button>
        ${state.quizStats.total>0 ? `<div class="result-card">上一輪結果：${state.quizStats.correct} / ${state.quizStats.total} 答對</div>` : ""}
      `;
    }
    const current = state.quizPool[state.quizIdx];
    const qtype = current.type || "single";
    return `
      <div class="quiz-progress">第 ${state.quizIdx+1} / ${state.quizPool.length} 題 · 答對 ${state.quizStats.correct}</div>
      <div class="quiz-card">
        <div class="quiz-chapter-tag">${current.chapter===0?'概論':('第'+toChinese(current.chapter)+'章')}${qtype==='multi'?' · 複選題':qtype==='fill'?' · 填空題':qtype==='truefalse'?' · 是非題':''}</div>
        <div class="quiz-question">${esc(current.text)}</div>
        ${qtype==='single' ? renderSingleOptions(current) : ""}
        ${qtype==='multi' ? renderMultiOptions(current) : ""}
        ${qtype==='fill' ? renderFillInput(current) : ""}
        ${qtype==='truefalse' ? renderTrueFalseOptions(current) : ""}
        ${state.quizRevealed && current.note ? `<div class="quiz-note">備註：${esc(current.note)}</div>` : ""}
        ${state.quizRevealed ? `<button class="primary-btn" id="nextQuizBtn">${state.quizIdx+1<state.quizPool.length?'下一題':'完成本輪'}</button>` : ""}
      </div>
    `;
  }
  function renderSingleOptions(current){
    return current.options.map((opt,i)=>{
      let cls="quiz-option";
      if(state.quizRevealed){
        if(i===current.answer) cls+=" correct";
        else if(i===state.quizSelected) cls+=" wrong";
      }
      return `<button class="${cls}" data-choose="${i}" ${state.quizRevealed?'disabled':''}>
        <span class="quiz-option-label">${'ABCD'[i]}</span>${esc(opt)}
      </button>`;
    }).join("");
  }
  function renderMultiOptions(current){
    const opts = current.options.map((opt,i)=>{
      let cls="quiz-option";
      const picked = state.quizMultiSelected.includes(i);
      if(state.quizRevealed){
        if(current.answer.includes(i)) cls+=" correct";
        else if(picked) cls+=" wrong";
      }
      return `<button class="${cls}" data-multitoggle="${i}" ${state.quizRevealed?'disabled':''}>
        <span class="quiz-option-label">${picked&&!state.quizRevealed?'✓':'ABCD'[i]}</span>${esc(opt)}
      </button>`;
    }).join("");
    const submit = !state.quizRevealed ? `<button class="primary-btn" id="multiSubmitBtn" style="margin-bottom:10px;">提交答案</button>` : "";
    return opts + submit;
  }
  function renderFillInput(current){
    const input = `<input class="text-input" id="fillInput" placeholder="輸入答案" value="${esc(state.quizFillInput)}" ${state.quizRevealed?'disabled':''} style="margin-bottom:10px;">`;
    const submit = !state.quizRevealed ? `<button class="primary-btn" id="fillSubmitBtn" style="margin-bottom:10px;">提交答案</button>` : "";
    const result = state.quizRevealed ? `<div class="q-answer" style="margin-bottom:10px;">正確答案：${esc(current.answer)}　${state.quizFillCorrect?'（你答對了 ✓）':'（你的答案：'+esc(state.quizFillInput||'（空白）')+'）'}</div>` : "";
    return input + submit + result;
  }
  function renderTrueFalseOptions(current){
    const choices = [{label:"○ 正確", value:"true"}, {label:"✕ 錯誤", value:"false"}];
    return choices.map(c=>{
      let cls="quiz-option";
      if(state.quizRevealed){
        if(c.value===current.answer) cls+=" correct";
        else if(c.value===state.quizSelected) cls+=" wrong";
      }
      return `<button class="${cls}" data-choose="${c.value}" ${state.quizRevealed?'disabled':''}>
        <span class="quiz-option-label" style="font-size:15px;">${c.value==="true"?"○":"✕"}</span>${c.label.split(" ").slice(1).join(" ")}
      </button>`;
    }).join("");
  }

  /* ---------- Wrong book ---------- */
  function computeWrongQuestions(){
    return state.questions
      .filter(q=>state.wrongMap[q.id] && !state.wrongMap[q.id].mastered)
      .map(q=>({...q, meta:state.wrongMap[q.id]}))
      .sort((a,b)=>(a.meta.dueDate||"").localeCompare(b.meta.dueDate||""));
  }
  function renderWrong(){
    const wq = computeWrongQuestions();
    const today = todayStr();
    const due = wq.filter(q=>!q.meta.dueDate||q.meta.dueDate<=today);
    const upcoming = wq.filter(q=>q.meta.dueDate && q.meta.dueDate>today);
    function card(q,dim){
      return `<div class="wrong-card" style="opacity:${dim?0.6:1}">
        <div class="wrong-top">
          <span class="q-chapter">${q.chapter===0?'概論':('第'+toChinese(q.chapter)+'章')}</span>
          <span class="wrong-count">錯過 ${q.meta.wrongCount} 次</span>
          ${q.meta.dueDate?`<span class="wrong-due">複習日 ${q.meta.dueDate}</span>`:""}
        </div>
        <div class="q-text">${esc(q.text)}</div>
        <button class="toggle-btn" data-showans="${q.id}" style="width:auto;display:inline-block;padding:6px 12px;">顯示答案</button>
        <div class="q-answer" data-ansbox="${q.id}" style="display:none;">正解：${esc(answerDisplay(q))}</div>
        <button class="mastered-btn" data-mastered="${q.id}">已熟記，移出錯題本</button>
      </div>`;
    }
    return `
      <div class="section-title">錯題本</div>
      <div class="section-desc">答錯的題目會依錯誤次數安排複習間隔（1 / 3 / 7 / 14 天），到期的題目會列在「今天該複習」。</div>
      <div class="sub-title">今天該複習（${due.length}）</div>
      ${due.length===0?`<div class="empty-hint">太好了，今天沒有需要複習的錯題。</div>`:""}
      ${due.map(q=>card(q,false)).join("")}
      ${upcoming.length>0?`<div class="sub-title">之後排程（${upcoming.length}）</div>${upcoming.map(q=>card(q,true)).join("")}`:""}
    `;
  }

  /* ---------- events ---------- */
  function bindEvents(){
    root.querySelectorAll("[data-tab]").forEach(el=>el.addEventListener("click",()=>{ state.tab=el.dataset.tab; render(); }));
    root.querySelectorAll("[data-goto]").forEach(el=>el.addEventListener("click",()=>{ state.tab=el.dataset.goto; render(); }));

    const examBadge = document.getElementById("examBadge");
    if(examBadge) examBadge.addEventListener("click",()=>{ state.headerEditing=true; render(); });
    const examDateInput = document.getElementById("examDateInput");
    if(examDateInput) examDateInput.addEventListener("change",(e)=>{ state.examDate=e.target.value; persist("meta"); });
    const examDoneBtn = document.getElementById("examDoneBtn");
    if(examDoneBtn) examDoneBtn.addEventListener("click",()=>{ state.headerEditing=false; render(); });

    const markBtn = document.getElementById("markTodayBtn");
    if(markBtn) markBtn.addEventListener("click",()=>{ markStudiedToday(); render(); });

    root.querySelectorAll("[data-cycle]").forEach(el=>el.addEventListener("click",()=>{
      const id = parseInt(el.dataset.cycle,10);
      const cur = state.chapterState[id]?.status||"todo";
      const next = cur==="todo"?"reading":cur==="reading"?"done":"todo";
      state.chapterState[id] = {...state.chapterState[id], status:next};
      persist("chapterState"); render();
    }));
    root.querySelectorAll("[data-notes]").forEach(el=>el.addEventListener("change",()=>{
      const id = parseInt(el.dataset.notes,10);
      state.chapterState[id] = {...state.chapterState[id], notes:el.value};
      persist("chapterState");
    }));

    root.querySelectorAll("[data-bankmode]").forEach(el=>el.addEventListener("click",()=>{
      state.bankMode = el.dataset.bankmode; render();
    }));

    const draftChapter = document.getElementById("draftChapter");
    if(draftChapter) draftChapter.addEventListener("change",e=>{ state.bankDraft.chapter=parseInt(e.target.value,10); });
    const draftText = document.getElementById("draftText");
    if(draftText) draftText.addEventListener("input",e=>{ state.bankDraft.text=e.target.value; });
    root.querySelectorAll("[data-draftopt]").forEach(el=>el.addEventListener("input",e=>{
      const i = parseInt(el.dataset.draftopt,10);
      state.bankDraft.options[i] = e.target.value;
    }));
    root.querySelectorAll("[data-draftans]").forEach(el=>el.addEventListener("change",()=>{
      state.bankDraft.answer = parseInt(el.dataset.draftans,10);
    }));
    const addManualBtn = document.getElementById("addManualBtn");
    if(addManualBtn) addManualBtn.addEventListener("click",()=>{
      const d = state.bankDraft;
      if(!d.text.trim() || d.options.some(o=>!o.trim())){ alert("請完整填寫題目與四個選項"); return; }
      state.questions.push({id:uid(), ...d, options:[...d.options]});
      state.bankDraft = {chapter:1,text:"",options:["","","",""],answer:0,note:""};
      persist("questions"); render();
    });

    const bulkChapterSelect = document.getElementById("bulkChapterSelect");
    if(bulkChapterSelect) bulkChapterSelect.addEventListener("change",e=>{ state.bankFilterChapter=parseInt(e.target.value,10); });
    const bulkText = document.getElementById("bulkText");
    if(bulkText) bulkText.addEventListener("input",e=>{ state.bankBulkText=e.target.value; });
    const bulkImportBtn = document.getElementById("bulkImportBtn");
    if(bulkImportBtn) bulkImportBtn.addEventListener("click",()=>{
      const blocks = state.bankBulkText.split(/\n\s*\n/).map(b=>b.trim()).filter(Boolean);
      const parsed=[]; const errors=[];
      const targetChapter = state.bankFilterChapter==='all'?1:state.bankFilterChapter;
      blocks.forEach((block,idx)=>{
        const lines = block.split("\n").map(l=>l.trim()).filter(Boolean);
        if(lines.length<6){ errors.push(`第 ${idx+1} 段格式不足（需要題目+4選項+答案，共6行）`); return; }
        const text = lines[0].replace(/^\d+[\.、]\s*/,"");
        const options = lines.slice(1,5).map(l=>l.replace(/^[\(（]?[1234ABCD][\)）\.、]\s*/,""));
        const ansRaw = lines[5].replace(/[^0-9ABCDabcd]/g,"");
        let answer=-1;
        if(/^[1-4]$/.test(ansRaw)) answer=parseInt(ansRaw,10)-1;
        else if(/^[A-Da-d]$/.test(ansRaw)) answer="ABCD".indexOf(ansRaw.toUpperCase());
        if(answer===-1){ errors.push(`第 ${idx+1} 段答案無法判讀：「${lines[5]}」`); return; }
        parsed.push({id:uid(), chapter:targetChapter, text, options, answer, note:""});
      });
      if(parsed.length) state.questions.push(...parsed);
      state.bankBulkMsg = `已匯入 ${parsed.length} 題${errors.length?`，${errors.length} 段失敗：\n`+errors.join("\n"):"。"}`;
      if(parsed.length) state.bankBulkText="";
      persist("questions"); render();
    });

    const bankFilterSelect = document.getElementById("bankFilterSelect");
    if(bankFilterSelect) bankFilterSelect.addEventListener("change",e=>{
      state.bankFilterChapter = e.target.value==="all"?"all":parseInt(e.target.value,10);
      render();
    });
    root.querySelectorAll("[data-delq]").forEach(el=>el.addEventListener("click",()=>{
      state.questions = state.questions.filter(q=>q.id!==el.dataset.delq);
      persist("questions"); render();
    }));

    const quizChapterSelect = document.getElementById("quizChapterSelect");
    if(quizChapterSelect) quizChapterSelect.addEventListener("change",e=>{
      state.quizChapterFilter = e.target.value==="all"?"all":parseInt(e.target.value,10);
    });
    const startQuizBtn = document.getElementById("startQuizBtn");
    if(startQuizBtn) startQuizBtn.addEventListener("click",()=>{
      const src = state.quizChapterFilter==="all" ? state.questions : state.questions.filter(q=>q.chapter===state.quizChapterFilter);
      state.quizPool = [...src].sort(()=>Math.random()-0.5);
      state.quizIdx=0; state.quizSelected=null; state.quizRevealed=false; state.quizStats={correct:0,total:0};
      state.quizMultiSelected=[]; state.quizFillInput=""; state.quizFillCorrect=false;
      render();
    });
    function recordAnswer(current, correct){
      markStudiedToday();
      state.quizStats = {correct: state.quizStats.correct+(correct?1:0), total: state.quizStats.total+1};
      const m = state.wrongMap;
      if(!correct){
        const existing = m[current.id]||{wrongCount:0};
        const wrongCount = existing.wrongCount+1;
        const intervalDays = [1,3,7,14][Math.min(wrongCount-1,3)];
        const due = new Date(); due.setDate(due.getDate()+intervalDays);
        m[current.id] = {wrongCount, lastSeen:todayStr(), dueDate:due.toISOString().slice(0,10), mastered:false};
      } else if(m[current.id]){
        if(m[current.id].wrongCount<=1){ m[current.id] = {...m[current.id], mastered:true}; }
        else{
          const due = new Date(); due.setDate(due.getDate()+14);
          m[current.id] = {...m[current.id], dueDate:due.toISOString().slice(0,10)};
        }
      }
      persist("wrongMap");
    }
    root.querySelectorAll("[data-choose]").forEach(el=>el.addEventListener("click",()=>{
      if(state.quizRevealed) return;
      const raw = el.dataset.choose;
      const val = (raw==="true"||raw==="false") ? raw : parseInt(raw,10);
      const current = state.quizPool[state.quizIdx];
      state.quizSelected = val; state.quizRevealed = true;
      recordAnswer(current, val===current.answer);
      render();
    }));
    root.querySelectorAll("[data-multitoggle]").forEach(el=>el.addEventListener("click",()=>{
      if(state.quizRevealed) return;
      const i = parseInt(el.dataset.multitoggle,10);
      const idx = state.quizMultiSelected.indexOf(i);
      if(idx>=0) state.quizMultiSelected.splice(idx,1); else state.quizMultiSelected.push(i);
      render();
    }));
    const multiSubmitBtn = document.getElementById("multiSubmitBtn");
    if(multiSubmitBtn) multiSubmitBtn.addEventListener("click",()=>{
      const current = state.quizPool[state.quizIdx];
      const a = [...state.quizMultiSelected].sort();
      const b = [...current.answer].sort();
      const correct = a.length===b.length && a.every((v,i2)=>v===b[i2]);
      state.quizRevealed = true;
      recordAnswer(current, correct);
      render();
    });
    const fillInputEl = document.getElementById("fillInput");
    if(fillInputEl) fillInputEl.addEventListener("input",e=>{ state.quizFillInput = e.target.value; });
    const fillSubmitBtn = document.getElementById("fillSubmitBtn");
    if(fillSubmitBtn) fillSubmitBtn.addEventListener("click",()=>{
      const current = state.quizPool[state.quizIdx];
      const norm = s => (s||"").toString().trim().toLowerCase().replace(/\s+/g,"");
      const correct = norm(state.quizFillInput) === norm(current.answer);
      state.quizFillCorrect = correct;
      state.quizRevealed = true;
      recordAnswer(current, correct);
      render();
    });
    const nextQuizBtn = document.getElementById("nextQuizBtn");
    if(nextQuizBtn) nextQuizBtn.addEventListener("click",()=>{
      if(state.quizIdx+1<state.quizPool.length){
        state.quizIdx++; state.quizSelected=null; state.quizRevealed=false;
        state.quizMultiSelected=[]; state.quizFillInput=""; state.quizFillCorrect=false;
      } else {
        state.quizPool=[];
      }
      render();
    });

    root.querySelectorAll("[data-showans]").forEach(el=>el.addEventListener("click",()=>{
      const box = root.querySelector(`[data-ansbox="${el.dataset.showans}"]`);
      if(box){ box.style.display="block"; el.style.display="none"; }
    }));
    root.querySelectorAll("[data-mastered]").forEach(el=>el.addEventListener("click",()=>{
      const id = el.dataset.mastered;
      state.wrongMap[id] = {...state.wrongMap[id], mastered:true};
      persist("wrongMap"); render();
    }));

    const lawSearchInput = document.getElementById("lawSearchInput");
    if(lawSearchInput){
      lawSearchInput.addEventListener("input",e=>{ state.lawQuery=e.target.value; render(); });
      lawSearchInput.focus();
      lawSearchInput.selectionStart = lawSearchInput.selectionEnd = lawSearchInput.value.length;
    }
    const lawToggleForm = document.getElementById("lawToggleForm");
    if(lawToggleForm) lawToggleForm.addEventListener("click",()=>{ state.lawShowForm=!state.lawShowForm; render(); });
    const bindLawField = (id,field)=>{
      const el = document.getElementById(id);
      if(el) el.addEventListener("input",e=>{ state.lawDraft[field]=e.target.value; });
    };
    bindLawField("lawDraftLaw","law"); bindLawField("lawDraftArticle","article");
    bindLawField("lawDraftPenalty","penalty"); bindLawField("lawDraftRefs","refs"); bindLawField("lawDraftNote","note");
    const lawAddBtn = document.getElementById("lawAddBtn");
    if(lawAddBtn) lawAddBtn.addEventListener("click",()=>{
      const d = state.lawDraft;
      if(!d.article.trim() || !d.penalty.trim()){ alert("至少要填條號與罰則內容"); return; }
      state.laws.unshift({id:uid(), ...d, seed:false});
      state.lawDraft = {law:"職業安全衛生法",article:"",penalty:"",refs:"",note:""};
      state.lawShowForm=false;
      persist("laws"); render();
    });
    root.querySelectorAll("[data-dellaw]").forEach(el=>el.addEventListener("click",()=>{
      state.laws = state.laws.filter(l=>l.id!==el.dataset.dellaw);
      persist("laws"); render();
    }));

    /* --- 備份/還原 --- */
    function getExportPayload(){
      return {
        v:1, examDate:state.examDate, chapterState:state.chapterState,
        questions:state.questions, wrongMap:state.wrongMap,
        studyLog:state.studyLog, laws:state.laws,
        exportedAt:new Date().toISOString()
      };
    }
    function applyImportPayload(data){
      if(!data.v||!data.chapterState) throw new Error("格式錯誤");
      state.examDate = data.examDate||"";
      state.chapterState = data.chapterState;
      state.questions = data.questions||[];
      state.wrongMap = data.wrongMap||{};
      state.studyLog = data.studyLog||{};
      state.laws = data.laws||LAW_SEED;
      saveData("meta",{examDate:state.examDate});
      saveData("chapterState",state.chapterState);
      saveData("questions",state.questions);
      saveData("wrongMap",state.wrongMap);
      saveData("studyLog",state.studyLog);
      saveData("laws",state.laws);
    }

    const shareExportBtn = document.getElementById("shareExportBtn");
    if(shareExportBtn) shareExportBtn.addEventListener("click",()=>{
      const json = JSON.stringify(getExportPayload(), null, 2);
      const blob = new Blob([json], {type:"application/json"});
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = "職安衛讀書進度_" + todayStr() + ".json";
      a.click();
      URL.revokeObjectURL(url);
      state.syncMsg = "✓ 已下載備份檔案";
      render();
    });

    const importFileInput = document.getElementById("importFileInput");
    if(importFileInput) importFileInput.addEventListener("change", e=>{
      const file = e.target.files[0];
      if(!file) return;
      const msg = document.getElementById("importMsg");
      const reader = new FileReader();
      reader.onload = evt=>{
        try{
          const data = JSON.parse(evt.target.result);
          if(!confirm("確定匯入並覆蓋這台裝置的所有進度？")) return;
          applyImportPayload(data);
          if(msg){ msg.style.color="#2F6B4F"; msg.textContent="✓ 匯入成功！"; }
          setTimeout(()=>{ state.tab="dashboard"; render(); }, 1000);
        } catch(err){
          if(msg){ msg.style.color="#b9554a"; msg.textContent="失敗："+err.message; }
        }
      };
      reader.readAsText(file);
    });
  }

  init();
})();
</script>
</body>
</html>
